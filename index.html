  "Type 2 Diabetes","Hypertension","Dyslipidaemia","Hypothyroidism",
  "PCOS","NAFLD","CKD","Gout","IBS","Anaemia","Osteoporosis","Heart Disease","Sleep Apnea",
];

function bmi(w,h){const hm=parseFloat(h)/100,wk=parseFloat(w);return(!hm||!wk)?"":(wk/(hm*hm)).toFixed(1);}
function bmiLabel(b){
  const n=parseFloat(b);
  if(!n) return "";
  if(n<18.5) return "Underweight";
  if(n<25)   return "Normal";
  if(n<30)   return "Overweight";
  if(n<35)   return "Obese I";
  if(n<40)   return "Obese II";
  return "Obese III";
}
function ree(w,h,age,gender){
  const wk=parseFloat(w),hcm=parseFloat(h),a=parseFloat(age)||30;
  if(!wk||!hcm) return 0;
  const f=gender==="Female";
  if(a<18){
    if(f) return a<3?16.252*wk+10.232*(hcm/100)*100-413.5:a<10?16.969*wk+1.618*hcm+371.2:8.365*wk+4.65*hcm+200;
    return a<3?0.167*wk+15.174*hcm-617.6:a<10?19.59*wk+1.303*hcm+414.9:16.25*wk+1.372*hcm+515.5;
  }
  return f?10*wk+6.25*hcm-5*a-161:10*wk+6.25*hcm-5*a+5;
}
const AMULT={sedentary:1.2,light:1.375,moderate:1.55,very_active:1.725,extra:1.9};
const CASE_ADJ={
  obesity_adult:-600,diabetes:-250,hypertension:0,osteoarthritis:-300,
  underweight_adult:500,underweight_child:400,post_bariatric:0,cp_autism_adhd:-100,
};

function Btn({label,onClick,color,outline,small}){
  return React.createElement("button",{
    onClick,
    style:{padding:small?"6px 14px":"10px 22px",borderRadius:9,border:`1.5px solid ${outline?color||C.teal:color||C.teal}`,
      background:outline?C.white:color||C.teal,color:outline?color||C.teal:C.white,
      fontSize:small?12:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}
  },label);
}
function Inp({label,rtl,...p}){
  return React.createElement("div",{style:{marginBottom:14}},
    label&&React.createElement("label",{style:{display:"block",fontSize:11,fontWeight:600,color:C.slate,marginBottom:3,textAlign:rtl?"right":"left"}},label),
    React.createElement("input",{...p,style:{width:"100%",boxSizing:"border-box",padding:"9px 11px",borderRadius:8,
      border:"1.5px solid "+C.border,background:C.white,color:C.ink,fontSize:14,outline:"none",
      direction:rtl?"rtl":"ltr",fontFamily:"inherit",...(p.style||{})}})
  );
}
function Sel({label,options,rtl,...p}){
  return React.createElement("div",{style:{marginBottom:14}},
    label&&React.createElement("label",{style:{display:"block",fontSize:11,fontWeight:600,color:C.slate,marginBottom:3,textAlign:rtl?"right":"left"}},label),
    React.createElement("select",{...p,style:{width:"100%",padding:"9px 11px",borderRadius:8,
      border:"1.5px solid "+C.border,background:C.white,color:C.ink,fontSize:14,outline:"none",
      appearance:"none",direction:rtl?"rtl":"ltr",fontFamily:"inherit"}},
      options.map(function(o,i){return React.createElement("option",{key:i,value:o.value!==undefined?o.value:o},o.label||o);})
    )
  );
}

function App(){
  const [lang,setLang]=useState("en");
  const ar=lang==="ar";
  const [apiKey,setApiKey]=useState(function(){try{return localStorage.getItem("nk")||"";}catch(e){return "";}});

  const [keyErr,setKeyErr]=useState("");
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [plan,setPlan]=useState(null);
  const [err,setErr]=useState("");

  // Patient
  const [name,setName]=useState(""); const [dob,setDob]=useState("");
  const [age,setAge]=useState(""); const [gender,setGender]=useState("Male");
  const [contact,setContact]=useState("");
  // Clinical
  const [wt,setWt]=useState(""); const [ht,setHt]=useState("");
  const [waist,setWaist]=useState(""); const [activity,setActivity]=useState("sedentary");
  const [labs,setLabs]=useState({});
  const [morbs,setMorbs]=useState([]);
  const [meds,setMeds]=useState(""); const [allergies,setAllergies]=useState("");
  // Diet config
  const [caseType,setCaseType]=useState(""); const [dietType,setDietType]=useState("");
  const [freq,setFreq]=useState("3plus1"); const [notes,setNotes]=useState("");
  const [calOverride,setCalOverride]=useState(""); const [useOverride,setUseOverride]=useState(false);

  const BMI=bmi(wt,ht);
  const REE=ree(wt,ht,age,gender);
  const ACT=AMULT[activity]||1.2;
  const TDEE=REE?Math.round(REE*ACT):0;
  const ADJ=CASE_ADJ[caseType]||0;
  const sugCals=TDEE?Math.max(1200,TDEE+ADJ):0;
  const finalCals=useOverride&&calOverride?parseInt(calOverride):sugCals;
  const freqObj=FREQ.find(function(f){return f.v===freq;})||FREQ[1];
  const dietObj=DIETS.find(function(d){return d.v===dietType;});
  const caseObj=CASES.find(function(c){return c.v===caseType;});

  function saveKey(){
    const k=keyInput.trim();
    if(!k.startsWith("sk-ant")){setKeyErr("Key must start with sk-ant-");return;}
    try{localStorage.setItem("nk",k);}catch(e){}
    setApiKey(k);setKeyErr("");setKeyInput("");
  }

  async function generate(){
    if(!caseType){setErr("Please select a case type.");return;}
    if(!wt||!ht){setErr("Weight and height are required.");return;}
    if(!dietType){setErr("Please select a diet type.");return;}
    setErr("");setLoading(true);setPlan(null);
    const labLines=LABS.filter(function(f){return labs[f.k];}).map(function(f){return "  "+f.en+": "+labs[f.k]+" (Ref: "+f.ref+")";}).join("\n");
    const mealSlots=freqObj.meals.join(", ");
    const prompt="You are a clinical dietitian. Generate a 7-day nutrition plan following ASPEN and ESPEN guidelines.\n\nPATIENT: "+name+" | DOB: "+dob+" | Age: "+age+" | Gender: "+gender+"\nWeight: "+wt+"kg | Height: "+ht+"cm | BMI: "+BMI+" | Activity: "+activity+"\n\nLABS:\n"+(labLines||"None")+"\n\nCOMORBIDITIES: "+(morbs.join(", ")||"None")+"\nMEDICATIONS: "+(meds||"None")+"\nALLERGIES: "+(allergies||"None")+"\n\nCASE: "+(caseObj?caseObj.en:caseType)+"\nDIET: "+(dietObj?dietObj.en:dietType)+" — "+(dietObj?dietObj.macros:"")+"\nMEALS/DAY: "+freqObj.en+" ("+mealSlots+")\nCALORIES: "+finalCals+" kcal/day\n\nNOTES: "+(notes||"None")+"\n\nReturn ONLY valid JSON, no markdown:\n{\n  \"summary\":{\"calories\":\""+finalCals+" kcal/day\",\"protein\":\"Xg\",\"carbs\":\"Xg\",\"fat\":\"Xg\",\"fiber\":\"Xg\",\"fluid\":\"XL\",\"rationale\":\"2 sentences citing ASPEN/ESPEN\"},\n  \"flags\":[\"clinical warning\"],\n  \"supplements\":[{\"name\":\"x\",\"dose\":\"x\",\"reason\":\"x\"}],\n  \"keyPrinciples\":[\"p1\",\"p2\",\"p3\",\"p4\",\"p5\"],\n  \"days\":[\n    {\"day\":\"Monday\",\"meals\":{"+freqObj.meals.map(function(m){return "\""+m+"\":{\"name\":\"...\",\"items\":[\"item with portion\"],\"calories\":000,\"notes\":\"tip\"}";}).join(",")+" },\"total\":0}\n  ],\n  \"lifestyle\":[\"advice\"],\n  \"followUp\":\"recommendation\"\n}\nAll 7 days. Egyptian/Middle Eastern food. Specific portions. No markdown.";

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:5000,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      const text=(data.content&&data.content[0]&&data.content[0].text)||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      parsed._date=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
      parsed._patient={name,dob,bmi:BMI,gender,caseLabel:caseObj?caseObj[lang]||caseObj.en:"",dietLabel:dietObj?dietObj[lang]||dietObj.en:""};
      setPlan(parsed);setStep(4);
    }catch(e){setErr("Error: "+e.message);}
    finally{setLoading(false);}
  }

  // ── API KEY SCREEN ─────────────────────────────────────────────
  if(!apiKey){
    return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(135deg,"+C.tealLt+" 0%,#fff 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Segoe UI',sans-serif"}},
      React.createElement("div",{style:{maxWidth:480,width:"100%",background:C.white,borderRadius:18,boxShadow:"0 8px 40px rgba(27,107,107,.12)",overflow:"hidden"}},
        React.createElement("div",{style:{background:"linear-gradient(135deg,"+C.teal+","+C.tealMid+")",padding:"28px 32px",textAlign:"center",color:C.white}},
          React.createElement("div",{style:{fontSize:40}},"🥗"),
          React.createElement("div",{style:{fontSize:22,fontWeight:800,marginTop:8}},"NutriPlan AI"),
          React.createElement("div",{style:{fontSize:12,opacity:.8,marginTop:4}},"Dr. Reda Okasha · Clinical Nutrition Platform")
        ),
        React.createElement("div",{style:{padding:"28px 32px"}},
          React.createElement("div",{style:{fontSize:16,fontWeight:700,color:C.ink,marginBottom:10}},"🔑 Enter your Anthropic API Key"),
          React.createElement("div",{style:{fontSize:13,color:C.slate,marginBottom:20,lineHeight:1.6}},
            "Get your key from ",React.createElement("b",null,"console.anthropic.com")," → API Keys → Create Key. Add $5 billing credit — lasts hundreds of plans."
          ),
          React.createElement("div",{style:{display:"flex",gap:8,marginBottom:8}},
            React.createElement("input",{type:"password",placeholder:"sk-ant-api03-...",value:keyInput,
              onChange:function(e){setKeyInput(e.target.value);setKeyErr("");},
              onKeyDown:function(e){if(e.key==="Enter")saveKey();},
              style:{flex:1,padding:"11px 14px",borderRadius:9,border:"2px solid "+(keyErr?C.red:C.border),fontSize:14,outline:"none",fontFamily:"inherit"},
              autoFocus:true
            }),
            React.createElement("button",{onClick:saveKey,style:{padding:"11px 20px",borderRadius:9,border:"none",background:"linear-gradient(135deg,"+C.teal+","+C.tealMid+")",color:C.white,fontWeight:700,fontSize:14,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}},"Save →")
          ),
          keyErr&&React.createElement("div",{style:{color:C.red,fontSize:12,marginBottom:8}},"⚠️ "+keyErr),
          React.createElement("div",{style:{fontSize:11,color:"#9BB0AD",marginTop:6}},"🔒 Saved only in your browser. Never shared.")
        )
      )
    );
  }

  // ── HEADER ─────────────────────────────────────────────────────
  const header=React.createElement("div",{style:{background:C.teal,height:56,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
      React.createElement("div",{style:{fontSize:22}},"🥗"),
      React.createElement("div",null,
        React.createElement("div",{style:{color:C.white,fontWeight:800,fontSize:15}},"NutriPlan AI"),
        React.createElement("div",{style:{color:"rgba(255,255,255,.7)",fontSize:10}},"Dr. Reda Okasha · ASPEN/ESPEN")
      )
    ),
    React.createElement("div",{style:{display:"flex",gap:8}},
      React.createElement("button",{onClick:function(){setLang(ar?"en":"ar");},style:{padding:"5px 12px",borderRadius:16,border:"1.5px solid rgba(255,255,255,.5)",background:"rgba(255,255,255,.15)",color:C.white,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},ar?"🇬🇧 English":"🇸🇦 عربي"),
      plan&&React.createElement("button",{onClick:function(){window.print();},style:{padding:"5px 12px",borderRadius:16,border:"1.5px solid rgba(255,255,255,.5)",background:"rgba(255,255,255,.15)",color:C.white,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},"🖨️ Print"),
      plan&&React.createElement("button",{onClick:function(){setPlan(null);setStep(1);},style:{padding:"5px 12px",borderRadius:16,border:"1.5px solid rgba(255,255,255,.5)",background:"rgba(255,255,255,.15)",color:C.white,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},ar?"+ جديد":"+ New"),
      React.createElement("button",{onClick:function(){try{localStorage.removeItem("nk");}catch(e){}setApiKey("");},style:{padding:"5px 12px",borderRadius:16,border:"1.5px solid rgba(255,255,255,.3)",background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}},"🔑 Key")
    )
  );

  // ── STEP BAR ───────────────────────────────────────────────────
  const STEP_LABELS=ar?["المريض","السريري","الحمية","الخطة"]:["Patient","Clinical","Diet Setup","Plan"];
  const stepBar=React.createElement("div",{style:{display:"flex",alignItems:"center",marginBottom:22,direction:ar?"rtl":"ltr"}},
    STEP_LABELS.map(function(s,i){
      const n=i+1,active=step===n,done=step>n;
      return React.createElement("div",{key:n,style:{display:"flex",alignItems:"center",flex:i<3?1:"none"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,cursor:done?"pointer":"default"},onClick:function(){if(done)setStep(n);}},
          React.createElement("div",{style:{width:26,height:26,borderRadius:"50%",background:done?C.sage:active?C.teal:C.border,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}},done?"✓":String(n)),
          React.createElement("span",{style:{fontSize:11,fontWeight:600,color:active?C.teal:done?C.sage:"#9BB0AD",whiteSpace:"nowrap"}},s)
        ),
        i<3&&React.createElement("div",{style:{flex:1,height:2,background:done?C.sage:C.border,margin:"0 6px",minWidth:10}})
      );
    })
  );

  // ── STEP 1 ─────────────────────────────────────────────────────
  const step1=React.createElement("div",{dir:ar?"rtl":"ltr"},
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.8,borderBottom:"2px solid "+C.tealLt,paddingBottom:8,marginBottom:16}},ar?"👤 بيانات المريض":"👤 Patient Information"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
      React.createElement("div",{style:{gridColumn:"1/-1"}},React.createElement(Inp,{label:ar?"الاسم الكامل *":"FULL NAME *",rtl:ar,value:name,onChange:function(e){setName(e.target.value);}})),
      React.createElement(Inp,{label:ar?"تاريخ الميلاد":"DATE OF BIRTH",type:"date",rtl:ar,value:dob,onChange:function(e){setDob(e.target.value);}}),
      React.createElement(Inp,{label:ar?"العمر":"AGE (years)",type:"number",rtl:ar,value:age,onChange:function(e){setAge(e.target.value);}}),
      React.createElement(Sel,{label:ar?"الجنس":"GENDER",rtl:ar,value:gender,onChange:function(e){setGender(e.target.value);},
        options:[{value:"Male",label:ar?"ذكر":"Male"},{value:"Female",label:ar?"أنثى":"Female"}]}),
      React.createElement(Inp,{label:ar?"رقم الملف":"FILE / CONTACT",rtl:ar,value:contact,onChange:function(e){setContact(e.target.value);}})
    )
  );

  // ── STEP 2 ─────────────────────────────────────────────────────
  const step2=React.createElement("div",{dir:ar?"rtl":"ltr"},
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.8,borderBottom:"2px solid "+C.tealLt,paddingBottom:8,marginBottom:16}},ar?"📏 القياسات":"📏 Anthropometrics"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
      React.createElement(Inp,{label:ar?"الوزن (كغ) *":"WEIGHT (kg) *",type:"number",step:"0.1",rtl:ar,value:wt,onChange:function(e){setWt(e.target.value);}}),
      React.createElement(Inp,{label:ar?"الطول (سم) *":"HEIGHT (cm) *",type:"number",step:"0.1",rtl:ar,value:ht,onChange:function(e){setHt(e.target.value);}})
    ),
    BMI&&React.createElement("div",{style:{background:C.mist,border:"1.5px solid "+C.border,borderRadius:10,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}},
      React.createElement("span",{style:{fontSize:12,color:C.slate}},"BMI"),
      React.createElement("span",{style:{fontWeight:700,fontSize:20,color:C.ink}},BMI),
      React.createElement("span",{style:{background:parseFloat(BMI)<18.5?C.blue:parseFloat(BMI)<25?C.sage:parseFloat(BMI)<30?C.amber:C.red,color:C.white,padding:"3px 12px",borderRadius:12,fontSize:12,fontWeight:700}},bmiLabel(BMI)),
      TDEE>0&&React.createElement("span",{style:{fontSize:12,color:C.slate}},"TDEE: "+TDEE+" kcal")
    ),
    React.createElement(Sel,{label:ar?"النشاط البدني":"ACTIVITY LEVEL",rtl:ar,value:activity,onChange:function(e){setActivity(e.target.value);},
      options:[
        {value:"sedentary",label:ar?"خامل":"Sedentary"},
        {value:"light",label:ar?"خفيف":"Lightly Active (1–3d/wk)"},
        {value:"moderate",label:ar?"معتدل":"Moderately Active (3–5d/wk)"},
        {value:"very_active",label:ar?"عالٍ":"Very Active (6–7d/wk)"},
        {value:"extra",label:ar?"مكثف جداً":"Extra Active"},
      ]}),
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.8,borderBottom:"2px solid "+C.tealLt,paddingBottom:8,marginBottom:16,marginTop:22}},ar?"🧪 المختبر":"🧪 Lab Results"),
