// ── Schofield REE equations (WHO/FAO 1985, ESPEN Paediatric GL) ────
function calcREE(wt, ht, age, gender) {
  const w=parseFloat(wt), h=parseFloat(ht), a=parseFloat(age)||30;
  if(!w||!h) return 0;
  const isFemale = gender==="Female"||gender==="أنثى";
  if(a < 18) {
    // Schofield height+weight equations (kcal/day)
    if(isFemale){
      if(a<3)  return 16.252*w + 10.232*(h/100)*100 - 413.5;
      if(a<10) return 16.969*w + 1.618*h + 371.2;
      return 8.365*w + 4.65*h + 200.0;
    } else {
      if(a<3)  return 0.167*w + 15.174*h - 617.6;
      if(a<10) return 19.59*w + 1.303*h + 414.9;
      return 16.25*w + 1.372*h + 515.5;
    }
  }
  // Mifflin-St Jeor (adults)
  return isFemale ? 10*w+6.25*h-5*a-161 : 10*w+6.25*h-5*a+5;
}

const ACTIVITY_MULT={sedentary:1.2,light:1.375,moderate:1.55,very_active:1.725,extra_active:1.9};
function calcTDEE(ree,act){return Math.round(ree*(ACTIVITY_MULT[act]||1.2));}

  underweight_child:{adj:+300, note:{en:"+300–500 kcal for catch-up growth (WHO)",ar:"فائض 300–500 سعرة لتعويض النمو (WHO)"}},

function suggestCalories(wt,ht,age,gender,activity,caseType,bariatricWeeks){
  if(caseType==="post_bariatric"){
    const w=parseInt(bariatricWeeks)||0;
    const cals=w<=2?350:w<=4?500:w<=8?700:w<=12?900:1100;
    return {value:cals,tdee:cals,note:CASE_CALORIE_ADJ.post_bariatric.note,formula:"Phase-based (ASMBS)"};
  }
  const ree=calcREE(wt,ht,age,gender);
  if(!ree) return {value:0,tdee:0,note:{en:"",ar:""},formula:""};
  const tdee=calcTDEE(ree,activity);
  const adj=CASE_CALORIE_ADJ[caseType];
  const value=adj?Math.max(1200,tdee+adj.adj):tdee;
  const formula=parseFloat(age)<18?"Schofield (Paediatric, WHO/FAO 1985)":"Mifflin-St Jeor";
  return{value,tdee,note:adj?.note||{en:"",ar:""},formula};
}

// ── Post-bariatric phases ──────────────────────────────────────────
function getBariatricPhase(weeks){
  const w=parseInt(weeks)||0;
  if(w<=2)  return{en:"Phase 1 – Clear Liquids (300–400 kcal)",ar:"المرحلة 1 – سوائل صافية",cals:350};
  if(w<=4)  return{en:"Phase 2 – Full Liquids (400–600 kcal)",ar:"المرحلة 2 – سوائل كاملة",cals:500};
  if(w<=8)  return{en:"Phase 3 – Purée / Soft Foods (600–800 kcal)",ar:"المرحلة 3 – مهروس",cals:700};
  if(w<=12) return{en:"Phase 4 – Soft Solid Foods (800–1000 kcal)",ar:"المرحلة 4 – طري",cals:900};
  return    {en:"Phase 5 – Regular Foods (1000–1200 kcal)",ar:"المرحلة 5 – طعام طبيعي",cals:1100};
}

// ── Paediatric WHO z-score ─────────────────────────────────────────
const WHO_BMI_MEDIAN={
  2:{m:16.0,f:15.7},3:{m:15.5,f:15.3},4:{m:15.1,f:15.0},
  5:{m:14.9,f:14.8},6:{m:15.1,f:15.1},7:{m:15.5,f:15.5},
  8:{m:16.0,f:16.1},9:{m:16.5,f:16.7},10:{m:17.1,f:17.4},
  11:{m:17.7,f:18.0},12:{m:18.2,f:18.6},13:{m:18.7,f:19.1},
  14:{m:19.3,f:19.7},15:{m:19.8,f:20.2},16:{m:20.4,f:20.6},
  17:{m:20.9,f:21.0},18:{m:21.4,f:21.3},
};
const WHO_BMI_SD={2:1.5,3:1.4,4:1.3,5:1.2,6:1.3,7:1.4,8:1.6,9:1.8,10:2.0,11:2.2,12:2.4,13:2.6,14:2.7,15:2.8,16:2.9,17:3.0,18:3.1};
function calcPedZScore(bmi,age,gender){
  const a=Math.round(parseFloat(age));
  if(!WHO_BMI_MEDIAN[a]||!bmi) return null;
  const g=(gender==="Female"||gender==="أنثى")?"f":"m";
  const median=WHO_BMI_MEDIAN[a][g], sd=WHO_BMI_SD[a]||2.0;
  const z=((parseFloat(bmi)-median)/sd).toFixed(2);
  let cat;
  if(z<-3)     cat={en:"Severely Wasted",ar:"هزال شديد",color:C.red};
  else if(z<-2)cat={en:"Underweight",ar:"نقص وزن",color:"#E67E22"};
  else if(z<1) cat={en:"Normal",ar:"طبيعي",color:C.sage};
  else if(z<2) cat={en:"Overweight Risk",ar:"خطر زيادة وزن",color:C.amber};
  else         cat={en:"Obese",ar:"سمنة",color:C.red};
  return{z,cat,median,sd};
}

// ── Growth chart data builder ──────────────────────────────────────
function buildGrowthChartData(gender,patientAge,patientBMI){
  const g=(gender==="Female"||gender==="أنثى")?"girls":"boys";
  const ref=WHO_CENTILES[g];
  return ref.ages.map((age,i)=>({
    age,
    P3:ref.p3[i], P15:ref.p15[i], P50:ref.p50[i],
    P85:ref.p85[i], P97:ref.p97[i],
    ...(Math.round(parseFloat(patientAge))===age?{Patient:parseFloat(patientBMI)}:{}),
  }));
}

function checkDrugs(meds,lang){
  if(!meds) return [];
  const lo=meds.toLowerCase();
  const flags=[];
  DRUG_INTERACTIONS.forEach(d=>{if(d.kw.some(k=>lo.includes(k))) d.flags.forEach(f=>flags.push(f[lang]||f.en));});
  return flags;
}

// ── ICS calendar generator ─────────────────────────────────────────
function downloadICS(patientName,followUpDate,doctorNote){
  const dt=followUpDate.replace(/-/g,"");
  const uid=Date.now()+"@nutriplan";
  const ics=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//NutriPlan AI//EN","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",`UID:${uid}`,`DTSTART;VALUE=DATE:${dt}`,`DTEND;VALUE=DATE:${dt}`,
    `SUMMARY:Follow-Up: ${patientName} — Dr. Reda Okasha`,
    `DESCRIPTION:Nutrition follow-up appointment.\\n${doctorNote||""}`,
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`followup_${patientName.replace(/\s/g,"_")}.ics`; a.click();
  URL.revokeObjectURL(url);
}

// ── Email summary generator ────────────────────────────────────────
function buildEmailBody(plan,patient,dietLabel,caseLabel){
  if(!plan) return "";
  const d0=plan.days?.[0];
  const meals=d0?Object.entries(d0.meals).map(([k,m])=>`  ${k}: ${m.name} (~${m.calories} kcal)`).join("\n"):"";
  return encodeURIComponent(
    `Dear ${patient.name||"Patient"},\n\nPlease find a summary of your personalised nutrition plan from Dr. Reda Okasha.\n\n`+
    `CASE: ${caseLabel}\nDIET TYPE: ${dietLabel}\n`+
    `DAILY TARGET: ${plan.summary.calories}\nProtein: ${plan.summary.protein} | Carbs: ${plan.summary.carbs} | Fat: ${plan.summary.fat}\n\n`+
    `SAMPLE DAY (Monday):\n${meals}\n\n`+
    `KEY PRINCIPLES:\n${plan.keyPrinciples?.map((p,i)=>`${i+1}. ${p}`).join("\n")||""}\n\n`+
    `FOLLOW-UP: ${plan.followUp}\n\n`+
    `Dr. Reda Okasha — Consultant Paediatrician & Clinical Nutritionist\n`+
    `This plan is based on ASPEN & ESPEN guidelines and is personalised for you.`
  );
}

function calcBMI(wt,ht){const h=parseFloat(ht)/100,w=parseFloat(wt);return(!h||!w||h<=0)?"":(w/(h*h)).toFixed(1);}
function bmiCat(bmi,t){
  const b=parseFloat(bmi);
  if(!b) return{label:"—",color:C.slate};
  if(b<18.5) return{label:t.bmiCats.underweight,color:"#2980B9"};
  if(b<25)   return{label:t.bmiCats.normal,color:C.sage};
  if(b<30)   return{label:t.bmiCats.overweight,color:C.amber};
  if(b<35)   return{label:t.bmiCats.obese1,color:"#E67E22"};
  if(b<40)   return{label:t.bmiCats.obese2,color:C.red};
  return     {label:t.bmiCats.obese3,color:C.red};
}

Weight: ${clinical.weight} kg | Height: ${clinical.height} cm | BMI: ${bmi} (${bc.label}) | Waist: ${clinical.waist||"N/A"} cm
Activity: ${clinical.activity} | REE formula: ${reeFormula}

LABS:
${labLines||"  None provided"}

COMORBIDITIES: ${morbidities.join(", ")||"None"}
MEDICATIONS: ${medications||"None"} | DRUG FLAGS: ${drugFlags.join("; ")||"None"}
ALLERGIES: ${allergies||"None"}

CASE: ${caseLabel}${caseExtra}
DIET TYPE: ${dietLabel} — ${macros}
MEAL STRUCTURE: ${freqLabel} — slots: ${mealList.join(", ")}
DAILY CALORIE TARGET: ${finalCals} kcal/day

NOTES: ${additionalNotes||"None"}

INSTRUCTIONS: Produce a 7-day meal plan. All food must be culturally suitable for Egyptian/Middle Eastern patients. Use specific portions (grams, ml, pieces). Vary meals daily.

Return ONLY valid JSON (no markdown, no backticks):
{
  "summary":{"calories":"${finalCals} kcal/day","protein":"Xg/day (Xg/kg)","carbs":"Xg/day (X%)","fat":"Xg/day (X%)","fiber":"Xg/day","fluid":"XL/day","rationale":"2-3 sentences citing ASPEN/ESPEN specific to this case"},
  "keyPrinciples":["p1","p2","p3","p4","p5"],
  "supplements":[{"name":"...","dose":"...","reason":"..."}],
  "flags":["critical clinical flag"],
  "days":[
    {"day":"Monday","meals":{${mealList.map(m=>`"${m}":{"name":"...","items":["item with portion"],"calories":000,"notes":"tip"}`).join(",")}},"dailyTotal":0000}
  ],
  "lifestyleAdvice":["a1","a2","a3"],
  "followUp":"interval and monitoring parameters"
}
Include ALL 7 days.`;
  }

  async function generatePlan(){
    if(!caseType){setError(t.errorCase);return;}
    if(!clinical.weight||!clinical.height){setError(t.errorMeasure);return;}
    if(!dietType){setError(t.errorDiet);return;}
    setError("");setLoading(true);setPlan(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:5000,messages:[{role:"user",content:buildPrompt()}]})
      });
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      parsed._meta={
        generatedAt:new Date().toLocaleDateString(lang==="ar"?"ar-EG":"en-GB",{day:"numeric",month:"long",year:"numeric"}),
        patient:{...patient,bmi,bmiCat:bc.label},
        caseLabel:caseObj?.[lang]||caseObj?.en||caseType,
        dietLabel:dietObj?.label[lang]||dietType,
        dietObj, mealSlots:mealFreqObj?.meals||["breakfast","lunch","snack","dinner"],
        calories:finalCals, drugFlags, lang, isPed,
        reeFormula:calSug.formula,
      };
      setPlan(parsed);setStep(4);
    }catch(e){setError(t.errorGenerate+" "+e.message);}
    finally{setLoading(false);}
  }

  // ── Step bar ──────────────────────────────────────────────────
  const StepBar=()=>(
    <div style={{display:"flex",alignItems:"center",marginBottom:24,direction:dir,overflowX:"auto",gap:0}}>
      {t.steps.map((s,i)=>{
        const n=i+1,active=step===n,done=step>n;
        return(
          <div key={n} style={{display:"flex",alignItems:"center",flex:i<5?1:"none",flexDirection:rtl?"row-reverse":"row",minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,cursor:done?"pointer":"default",flexDirection:rtl?"row-reverse":"row"}}
              onClick={()=>done&&setStep(n)}>
              <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,
                background:done?C.sage:active?C.teal:C.border,
                color:C.white,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,fontWeight:700,transition:"background .3s"}}>{done?"✓":n}</div>
              <span style={{fontSize:10.5,fontWeight:600,whiteSpace:"nowrap",
                color:active?C.teal:done?C.sage:"#9BB0AD"}}>{s}</span>
            </div>
            {i<5&&<div style={{flex:1,height:2,background:done?C.sage:C.border,margin:"0 4px",minWidth:8}}/>}
          </div>
        );
      })}
    </div>
  );
  // ── Step 1 ────────────────────────────────────────────────────
  const Step1=()=>(
    <div dir={dir}>
      <SecT icon="👤" rtl={rtl}>{t.patientInfo}</SecT>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <div style={{gridColumn:"1/-1"}}><Inp label={t.fullName+" *"} rtl={rtl} value={patient.name} onChange={e=>setPatient({...patient,name:e.target.value})}/></div>
        <Inp label={t.dob+" *"} type="date" rtl={rtl} value={patient.dob} onChange={e=>setPatient({...patient,dob:e.target.value})}/>
        <Inp label={t.age} type="number" min="0" max="120" rtl={rtl} value={patient.age} onChange={e=>setPatient({...patient,age:e.target.value})}/>
        <Sel label={t.gender} rtl={rtl} options={t.genders.map((g,i)=>({value:["","Male","Female","Prefer not to say"][i],label:g}))}
          value={patient.gender} onChange={e=>setPatient({...patient,gender:e.target.value})}/>
        <Inp label={t.contact} rtl={rtl} value={patient.contact} onChange={e=>setPatient({...patient,contact:e.target.value})}/>
      </div>
    </div>
  );

  // ── Step 2 ────────────────────────────────────────────────────
  const Step2=()=>{
    const [showChart,setShowChart]=useState(false);
    const chartData=isPed&&bmi?buildGrowthChartData(patient.gender,patient.age,bmi):[];
    return(
      <div dir={dir}>
        <SecT icon="📏" rtl={rtl}>{t.anthropometrics}</SecT>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          <Inp label={t.weight+" *"} type="number" step="0.1" rtl={rtl} value={clinical.weight} onChange={e=>setClinical({...clinical,weight:e.target.value})}/>
          <Inp label={t.height+" *"} type="number" step="0.1" rtl={rtl} value={clinical.height} onChange={e=>setClinical({...clinical,height:e.target.value})}/>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:C.slate,marginBottom:4,textAlign:rtl?"right":"left"}}>{t.bmiLabel}</label>
            <div style={{padding:"9px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,background:C.mist,display:"flex",alignItems:"center",justifyContent:"space-between",direction:"ltr"}}>
              <span style={{fontWeight:700,fontSize:16,color:C.ink}}>{bmi||"—"}</span>
              {bmi&&<Badge text={bc.label} color={bc.color}/>}
            </div>
          </div>
          <Inp label={t.waist} type="number" rtl={rtl} value={clinical.waist} onChange={e=>setClinical({...clinical,waist:e.target.value})}/>
        </div>
        <Sel label={t.activity} rtl={rtl} options={t.activityLevels} value={clinical.activity} onChange={e=>setClinical({...clinical,activity:e.target.value})}/>

        {/* Paediatric z-score & growth chart */}
        {isPed&&bmi&&(
          <div style={{background:C.blueLt,border:`1.5px solid ${C.blue}30`,borderRadius:12,padding:"14px 18px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexDirection:rtl?"row-reverse":"row"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.blue}}>👶 {t.zScore}</div>
              <button onClick={()=>setShowChart(v=>!v)} style={{fontSize:11,fontWeight:600,background:"none",
                border:`1px solid ${C.blue}`,borderRadius:6,padding:"3px 10px",color:C.blue,cursor:"pointer"}}>
                {showChart?(rtl?"إخفاء":"Hide Chart"):(rtl?"عرض مخطط WHO":t.growthChart.split("(")[0].trim())}
              </button>
            </div>
            {pzScore&&(
              <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{color:C.slate,fontSize:13}}>Z = <b style={{color:C.ink}}>{pzScore.z}</b></span>
                <Badge text={pzScore.cat[lang]} color={pzScore.cat.color}/>
                <span style={{fontSize:11,color:"#9BB0AD"}}>Median {pzScore.median} ± {pzScore.sd} SD</span>
                <span style={{fontSize:11,color:C.teal,fontWeight:600}}>{t.reeFormula||""} {t.schofieldNote}</span>
              </div>
            )}
            {showChart&&chartData.length>0&&(
              <div style={{marginTop:14,overflowX:"auto"}}>
                <div style={{fontSize:11,fontWeight:600,color:C.blue,marginBottom:6}}>{t.growthChart}</div>
                <LineChart width={580} height={220} data={chartData} margin={{top:5,right:20,bottom:5,left:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#E4F4F4"/>
                  <XAxis dataKey="age" label={{value:"Age (years)",position:"insideBottom",offset:-2,fontSize:10}} tick={{fontSize:10}}/>
                  <YAxis label={{value:"BMI",angle:-90,position:"insideLeft",fontSize:10}} tick={{fontSize:10}} domain={[10,32]}/>
                  <Tooltip contentStyle={{fontSize:11}}/>
                  <Legend wrapperStyle={{fontSize:10}}/>
                  <Line type="monotone" dataKey="P3" stroke="#93C5FD" strokeWidth={1} dot={false} strokeDasharray="3 3"/>
                  <Line type="monotone" dataKey="P15" stroke="#60A5FA" strokeWidth={1} dot={false} strokeDasharray="3 3"/>
                  <Line type="monotone" dataKey="P50" stroke="#2563EB" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="P85" stroke="#F97316" strokeWidth={1} dot={false} strokeDasharray="3 3"/>
                  <Line type="monotone" dataKey="P97" stroke="#DC2626" strokeWidth={1} dot={false} strokeDasharray="3 3"/>
                  <Line type="monotone" dataKey="Patient" stroke="#1B6B6B" strokeWidth={0} dot={{r:7,fill:"#1B6B6B",strokeWidth:2,stroke:"#fff"}}/>
                </LineChart>
                <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:4,fontSize:10,color:C.slate}}>
                  {[["P3","#93C5FD"],["P15","#60A5FA"],["P50 (Median)","#2563EB"],["P85","#F97316"],["P97","#DC2626"],["Patient","#1B6B6B"]].map(([l,c])=>(
                    <span key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{width:12,height:3,background:c,display:"inline-block",borderRadius:2}}/>
                      {l}
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {/* REE formula notice */}
        {clinical.weight&&clinical.height&&(
          <div style={{background:C.sageLt,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",marginBottom:14,fontSize:11.5,color:C.teal,direction:"ltr"}}>
            🔬 {isPed?t.schofieldNote:t.mifflinNote}{calSug.value>0?` | REE ≈ ${Math.round(calcREE(clinical.weight,clinical.height,patient.age,patient.gender))} kcal/day · TDEE ≈ ${calSug.tdee} kcal/day`:""}
          </div>
        )}

        <SecT icon="🧪" rtl={rtl}>{t.labResults}</SecT>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          {LAB_FIELDS.map(f=>(
            <div key={f.key} style={{marginBottom:11}}>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:C.slate,marginBottom:3,textAlign:rtl?"right":"left"}}>
                {f[lang]||f.en} <span style={{fontWeight:400,color:"#9BB0AD"}}>({f.normal})</span>
              </label>
              <input type="number" step="0.01" placeholder="—" value={labs[f.key]||""}
                onChange={e=>setLabs({...labs,[f.key]:e.target.value})}
                style={{width:"100%",boxSizing:"border-box",padding:"7px 10px",borderRadius:8,
                  border:`1.5px solid ${C.border}`,background:C.white,color:C.ink,fontSize:13,outline:"none",direction:"ltr"}}
                onFocus={e=>e.target.style.borderColor=C.tealMid}
                onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
          ))}
        </div>

        <SecT icon="🩺" rtl={rtl}>{t.medHistory}</SecT>
        <label style={{fontSize:12,fontWeight:600,color:C.slate,display:"block",marginBottom:8,textAlign:rtl?"right":"left"}}>{t.morbidities}</label>
        <div style={{display:"flex",flexWrap:"wrap",marginBottom:14,justifyContent:rtl?"flex-end":"flex-start"}}>
          {MORBIDITY_LIST.map(m=><Chip key={m.en} label={m[lang]||m.en} active={morbidities.includes(m.en)} onClick={()=>toggleMorb(m.en)}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          <Inp label={t.medications} rtl={rtl} value={medications} onChange={e=>setMedications(e.target.value)}/>
          <Inp label={t.allergies} rtl={rtl} value={allergies} onChange={e=>setAllergies(e.target.value)}/>
        </div>
        {drugFlags.length>0&&(
          <div style={{background:C.amberLt,border:`1.5px solid ${C.amber}40`,borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#C87E00",marginBottom:6}}>⚠️ {t.drugFlags}</div>
            {drugFlags.map((f,i)=><div key={i} style={{fontSize:12.5,color:C.slate,marginBottom:4}}>• {f}</div>)}
          </div>
        )}
      </div>
    );
  };
  // ── Step 3: Diet Config ───────────────────────────────────────
  const Step3=()=>(
    <div dir={dir}>
      <SecT icon="🎯" rtl={rtl}>{t.dietConfig}</SecT>
      <Sel label={t.caseType+" *"} rtl={rtl}
        options={[{value:"",label:t.selectCase},...CASE_TYPES.map(c=>({value:c.value,label:c[lang]||c.en}))]}
        value={caseType} onChange={e=>handleCaseChange(e.target.value)}/>
      {caseType==="diabetes"&&<Sel label="DIABETES TYPE" rtl={rtl} options={t.diabetesTypes} value={diabetesType} onChange={e=>setDiabetesType(e.target.value)}/>}
      {caseType==="post_bariatric"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          <Sel label="SURGERY TYPE" rtl={rtl} options={t.bariatricTypes} value={bariatricType} onChange={e=>setBariatricType(e.target.value)}/>
          <Inp label="WEEKS POST-OP" type="number" min="0" rtl={rtl} value={bariatricWeeks} onChange={e=>setBariatricWeeks(e.target.value)}/>
        </div>
      )}
      {barPhase&&<div style={{background:C.purpleLt,border:`1.5px solid ${C.purple}30`,borderRadius:10,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:C.purple,marginBottom:3}}>🔬 Bariatric Phase</div>
        <div style={{fontSize:13,color:C.slate}}>{barPhase[lang]||barPhase.en}</div>
      </div>}
      {caseType==="cp_autism_adhd"&&(
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:600,color:C.slate,display:"block",marginBottom:8,textAlign:rtl?"right":"left"}}>{t.cpList?.[0]?"CONDITIONS:":""}</label>
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:rtl?"flex-end":"flex-start"}}>
            {t.cpList.map((c,i)=>{const en=["Cerebral Palsy","Autism Spectrum Disorder","ADHD","Intellectual Disability","Sensory Processing Disorder"][i];
              return <Chip key={en} label={c} active={cpConditions.includes(en)} onClick={()=>toggleCP(en)} color={C.purple}/>;
            })}
          </div>
        </div>
      )}

      {/* Diet type table */}
      <SecT icon="🥗" rtl={rtl}>{t.dietType}</SecT>
      <button onClick={()=>setShowDietTable(v=>!v)} style={{background:"none",border:`1.5px solid ${C.border}`,borderRadius:8,
        padding:"6px 14px",fontSize:12,fontWeight:600,color:C.teal,cursor:"pointer",marginBottom:12}}>
        📊 {showDietTable?(rtl?"إخفاء الجدول":"Hide Table"):(rtl?"جدول المقارنة":t.dietTable)}
      </button>
      {showDietTable&&(
        <div style={{overflowX:"auto",marginBottom:14}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12,minWidth:680}}>
            <thead><tr style={{background:C.teal,color:C.white}}>
              {["Type","Carbs","Protein","Fat","Fibre","Na","Key Foods","Best For"].map((h,i)=>(
                <th key={i} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,
                  borderRadius:i===0?"8px 0 0 0":i===7?"0 8px 0 0":0}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{DIET_TYPES.map((d,i)=>{
              const isRec=recDiets.includes(d.value), isSel=dietType===d.value;
              return(
                <tr key={d.value} onClick={()=>setDietType(d.value)}
                  style={{cursor:"pointer",background:isSel?d.color+"18":isRec?d.color+"08":i%2===0?"#FAFEFE":C.white,

                  <td style={{padding:"9px 10px",borderLeft:`3px solid ${isSel?d.color:"transparent"}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:15}}>{d.icon}</span>
                      <div><div style={{fontWeight:700,color:d.color}}>{d.label[lang]}</div>
                        {isRec&&<Badge text={t.recommended} color={d.color}/>}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"9px 10px",fontWeight:600,color:C.slate}}>{d.carbs}</td>
                  <td style={{padding:"9px 10px",fontWeight:600,color:C.slate}}>{d.protein}</td>
                  <td style={{padding:"9px 10px",fontWeight:600,color:C.slate}}>{d.fat}</td>
                  <td style={{padding:"9px 10px",color:C.slate}}>{d.fiber}</td>
                  <td style={{padding:"9px 10px",color:C.slate,fontSize:11}}>{d.sodium}</td>
                  <td style={{padding:"9px 10px",color:C.slate,fontSize:11,maxWidth:150}}>{d.keyFoods[lang]}</td>
                  <td style={{padding:"9px 10px",fontSize:11}}>
                    {d.bestFor.map(bf=>{const ct=CASE_TYPES.find(c=>c.value===bf);

          </table>
        </div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:rtl?"flex-end":"flex-start",marginBottom:10}}>
        {DIET_TYPES.map(d=><Chip key={d.value} label={`${d.icon} ${d.label[lang]}`} color={d.color}
          active={dietType===d.value} onClick={()=>setDietType(d.value)}/>)}
      </div>
      {dietObj&&<div style={{background:dietObj.color+"12",border:`1.5px solid ${dietObj.color}30`,borderRadius:10,

        <div style={{fontWeight:700,color:dietObj.color,marginBottom:4}}>{dietObj.icon} {dietObj.label[lang]}</div>
        <div style={{fontSize:12.5,color:C.slate}}>{dietObj.desc[lang]}</div>
        <div style={{fontSize:12,color:C.slate,marginTop:5}}>🌾 {dietObj.carbs} · 💪 {dietObj.protein} · 🫒 {dietObj.fat} · 🥦 {dietObj.fiber}</div>
      </div>}

      {/* Meal frequency */}
      <SecT icon="🍽️" rtl={rtl}>{t.mealFreq}</SecT>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        {MEAL_FREQ_OPTS.map(opt=>(
          <div key={opt.value} onClick={()=>setMealFreq(opt.value)} style={{
            border:`2px solid ${mealFreq===opt.value?C.teal:C.border}`,
            background:mealFreq===opt.value?C.tealLt:C.white,borderRadius:12,
            padding:"12px 16px",cursor:"pointer",transition:"all .2s"}}>
            <div style={{fontWeight:700,color:mealFreq===opt.value?C.teal:C.ink,fontSize:13,textAlign:rtl?"right":"left"}}>{opt[lang]||opt.en}</div>
            <div style={{fontSize:11.5,color:C.slate,marginTop:4,textAlign:rtl?"right":"left"}}>{opt.desc[lang]}</div>
            <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap",justifyContent:rtl?"flex-end":"flex-start"}}>
              {opt.meals.map(m=>(
                <span key={m} style={{fontSize:10,background:mealFreq===opt.value?C.teal+"20":C.mist,
                  color:mealFreq===opt.value?C.teal:C.slate,padding:"2px 7px",borderRadius:10,fontWeight:600}}>
                  {t.mealIcons[m]} {t.meals[m]}
                </span>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Calorie target */}
      <SecT icon="⚡" rtl={rtl}>{t.caloriesTarget}</SecT>
      {calSug.value>0&&(
        <div style={{background:C.amberLt,border:`1.5px solid ${C.amber}40`,borderRadius:12,padding:"16px 20px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexDirection:rtl?"row-reverse":"row",marginBottom:8}}>
            <div>
              <div style={{fontSize:10,color:C.slate,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{calSug.formula}</div>
              <div style={{fontSize:26,fontWeight:800,color:C.amber,lineHeight:1}}>{calSug.value.toLocaleString()}
                <span style={{fontSize:13,fontWeight:500,color:C.slate}}> kcal/day</span>
              </div>
              <div style={{fontSize:11,color:C.slate,marginTop:3}}>TDEE: {calSug.tdee.toLocaleString()} kcal · {calSug.note[lang]||calSug.note.en}</div>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,fontWeight:600,color:C.slate,flexDirection:rtl?"row-reverse":"row"}}>
              <input type="checkbox" checked={useOverride} onChange={e=>setUseOverride(e.target.checked)}/>
              {t.calorieOverride}
            </label>
          </div>
          {useOverride&&<Inp label="Custom kcal/day" type="number" min="800" max="5000" rtl={rtl} value={calorieOverride} onChange={e=>setCalorieOverride(e.target.value)} style={{background:C.white}}/>}
          {useOverride&&calorieOverride&&<div style={{fontSize:12,color:C.teal,fontWeight:600}}>✓ Using: {parseInt(calorieOverride).toLocaleString()} kcal/day</div>}
        </div>
      )}

      {/* Notes */}
      <SecT icon="📝" rtl={rtl}>{rtl?"ملاحظات إضافية":"Additional Notes"}</SecT>
      <textarea rows={4} placeholder={t.notesPlaceholder} value={additionalNotes} onChange={e=>setAdditionalNotes(e.target.value)}
        style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",borderRadius:8,
          border:`1.5px solid ${C.border}`,background:C.white,color:C.ink,fontSize:14,
          outline:"none",resize:"vertical",fontFamily:"inherit",direction:dir}}/>

      {/* Case summary */}

        {showCalPanel&&(

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
              <Inp label={tL.followUpDate} type="date" rtl={rtl} value={followUpDate} onChange={e=>setFollowUpDate(e.target.value)}/>

            <button onClick={()=>{if(followUpDate) downloadICS(m.patient.name||"Patient",followUpDate,followUpNote);}}

            </p>

        {/* Day tabs */}
        <div className="no-print" style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>

              border:`1.5px solid ${activeDay===i?C.teal:C.border}`,
              background:activeDay===i?C.teal:C.white,color:activeDay===i?C.white:C.slate,cursor:"pointer"}}>
              {dayNames[i]||d.day}
            </button>
          ))}
        </div>

        {/* Meals grid */}
        {plan.days?.map((day,di)=>(
          <div key={di} className={di!==activeDay?"no-print":""} style={{marginBottom:24}}>
            <div style={{fontSize:15,fontWeight:800,color:C.teal,marginBottom:12,
              display:"flex",alignItems:"center",gap:10,flexDirection:m.lang==="ar"?"row-reverse":"row"}}>
              <span style={{background:C.teal,color:C.white,borderRadius:20,padding:"3px 16px",fontSize:13}}>{dayNames[di]||day.day}</span>

              {Object.entries(day.meals||{}).map(([mk,meal])=>(
                <div key={mk} style={{background:MEAL_COLORS[mk]||C.mist,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>

                    display:"flex",alignItems:"center",justifyContent:"space-between",flexDirection:m.lang==="ar"?"row-reverse":"row"}}>

                  <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:5,textAlign:m.lang==="ar"?"right":"left"}}>{meal.name}</div>
                  <ul style={{margin:0,paddingLeft:m.lang==="ar"?0:14,paddingRight:m.lang==="ar"?14:0}}>
                    {meal.items?.map((item,ii)=><li key={ii} style={{fontSize:12.5,color:C.slate,marginBottom:3,textAlign:m.lang==="ar"?"right":"left"}}>{item}</li>)}
                  </ul>
                  {meal.notes&&<div style={{fontSize:11.5,color:C.tealMid,marginTop:5,fontStyle:"italic",textAlign:m.lang==="ar"?"right":"left"}}>💡 {meal.notes}</div>}

            <div style={{fontSize:12,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>🔑 {tL.keyPrinciples}</div>

                <div style={{width:20,height:20,borderRadius:"50%",background:C.teal,color:C.white,fontSize:11,

          <div style={{marginTop:2}}>{m.generatedAt} · AlMather Health</div>

  // ── Step 5: Progress & Labs ───────────────────────────────────
  const ProgressTab=()=>{
    const metricObj=TRACKABLE_LABS.find(l=>l.key===chartMetric)||TRACKABLE_LABS[0];
    const chartData=progressRecords.map(r=>({
      date:r.date, [metricObj.key]:parseFloat(r[metricObj.key])||null
    })).filter(d=>d[metricObj.key]!=null);
    return(
      <div dir={dir}>
        <SecT icon="📈" rtl={rtl}>{t.progressTab}</SecT>

        {/* Add visit form */}
        <div style={{background:C.mist,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"16px 20px",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.teal,marginBottom:12,textAlign:rtl?"right":"left"}}>{t.addRecord}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0 12px"}}>
            <Inp label={t.visitDate} type="date" rtl={rtl} value={newRecord.date} onChange={e=>setNewRecord({...newRecord,date:e.target.value})}/>
            <Inp label={t.visitWeight+" (kg)"} type="number" step="0.1" rtl={rtl} value={newRecord.weight} onChange={e=>setNewRecord({...newRecord,weight:e.target.value})}/>
            <Inp label="HbA1c (%)" type="number" step="0.1" rtl={rtl} value={newRecord.hba1c} onChange={e=>setNewRecord({...newRecord,hba1c:e.target.value})}/>
            <Inp label="Fasting Glucose (mg/dL)" type="number" rtl={rtl} value={newRecord.fbs} onChange={e=>setNewRecord({...newRecord,fbs:e.target.value})}/>
            <Inp label="Cholesterol (mg/dL)" type="number" rtl={rtl} value={newRecord.chol} onChange={e=>setNewRecord({...newRecord,chol:e.target.value})}/>
            <Inp label="Triglycerides (mg/dL)" type="number" rtl={rtl} value={newRecord.tg} onChange={e=>setNewRecord({...newRecord,tg:e.target.value})}/>
            <Inp label="Vitamin D (ng/mL)" type="number" rtl={rtl} value={newRecord.vitd} onChange={e=>setNewRecord({...newRecord,vitd:e.target.value})}/>
            <div style={{gridColumn:"span 2"}}>
              <Inp label={t.visitNotes} rtl={rtl} value={newRecord.notes} onChange={e=>setNewRecord({...newRecord,notes:e.target.value})}/>
            </div>
          </div>
          <button onClick={()=>{
            if(newRecord.date){
              setProgressRecords(p=>[...p,{...newRecord,id:Date.now()}]);
              setNewRecord({date:"",weight:"",hba1c:"",fbs:"",chol:"",tg:"",vitd:"",notes:""});
            }
          }} style={{padding:"9px 24px",borderRadius:8,border:"none",background:C.teal,color:C.white,
            fontWeight:700,fontSize:13,cursor:"pointer"}}>
            + {rtl?"إضافة الزيارة":"Add Visit"}
          </button>
        </div>

        {progressRecords.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:"#9BB0AD",fontSize:14}}>{t.noRecords}</div>

          <>
            {/* Metric chart */}
            <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexDirection:rtl?"row-reverse":"row"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.teal,textTransform:"uppercase"}}>{t.labTracked}</div>

                    fontSize:12,color:C.ink,outline:"none"}}>
                  {TRACKABLE_LABS.map(l=><option key={l.key} value={l.key}>{l[lang]||l.en}</option>)}

                  <Tooltip contentStyle={{fontSize:11}} formatter={(v)=>[`${v} ${metricObj.unit}`,metricObj[lang]||metricObj.en]}/>
                  <Line type="monotone" dataKey={metricObj.key} stroke={metricObj.color} strokeWidth={2.5}

                <div style={{textAlign:"center",padding:20,color:"#9BB0AD",fontSize:13}}>

                      <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?C.mist:C.white}}>

                        <td style={{padding:"9px 10px",fontWeight:700,color:C.ink}}>{r.weight||"—"}</td>

                        <td style={{padding:"9px 10px",color:r.fbs&&parseFloat(r.fbs)>100?C.amber:C.ink}}>{r.fbs||"—"}</td>
                        <td style={{padding:"9px 10px",color:r.chol&&parseFloat(r.chol)>200?C.red:C.ink}}>{r.chol||"—"}</td>
                        <td style={{padding:"9px 10px",color:r.tg&&parseFloat(r.tg)>150?C.amber:C.ink}}>{r.tg||"—"}</td>
                        <td style={{padding:"9px 10px",color:r.vitd&&parseFloat(r.vitd)<30?C.red:C.ink}}>{r.vitd||"—"}</td>
                        <td style={{padding:"9px 10px",color:C.slate,fontSize:11}}>{r.notes||"—"}</td>
                        <td style={{padding:"9px 10px",fontWeight:700,color:dw===null?"#9BB0AD":parseFloat(dw)<0?C.sage:C.red,textAlign:"center"}}>
                          {dw===null?"—":parseFloat(dw)<0?dw:`+${dw}`}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Summary */}
            {progressRecords.length>=2&&(()=>{
              const first=progressRecords[0], last=progressRecords[progressRecords.length-1];
              const wDiff=first.weight&&last.weight?(parseFloat(last.weight)-parseFloat(first.weight)).toFixed(1):null;
              return(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
                  {wDiff&&<div style={{background:parseFloat(wDiff)<0?C.sageLt:C.amberLt,border:`1.5px solid ${parseFloat(wDiff)<0?C.sage:C.amber}40`,
                    borderRadius:12,padding:"14px 20px",textAlign:"center"}}>
                    <div style={{fontSize:22,fontWeight:800,color:parseFloat(wDiff)<0?C.sage:C.amber}}>{parseFloat(wDiff)<0?wDiff:`+${wDiff}`} kg</div>
                    <div style={{fontSize:11,color:C.slate,marginTop:3}}>{t.totalChange} · {progressRecords.length} visits</div>
                  </div>}
                  {first.hba1c&&last.hba1c&&<div style={{background:"#FEF3E7",border:`1.5px solid ${C.orange}30`,borderRadius:12,padding:"14px 20px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800,color:C.orange}}>{first.hba1c} → {last.hba1c} %</div>
                    <div style={{fontSize:11,color:C.slate,marginTop:3}}>HbA1c change</div>
                  </div>}
                  {first.chol&&last.chol&&<div style={{background:C.purpleLt,border:`1.5px solid ${C.purple}30`,borderRadius:12,padding:"14px 20px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800,color:C.purple}}>{first.chol} → {last.chol}</div>
                    <div style={{fontSize:11,color:C.slate,marginTop:3}}>Total Cholesterol (mg/dL)</div>
                  </div>}
                </div>
              );
            })()}
          </>
        )}
      </div>
    );
  };

  // ── Step 6: Template Library ──────────────────────────────────
  const TemplatesTab=()=>(
    <div dir={dir}>
      <SecT icon="📚" rtl={rtl}>{t.templatesTab}</SecT>
      {/* Save current */}
      {caseType&&dietType&&(
        <div style={{background:C.sageLt,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"16px 20px",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.teal,marginBottom:10}}>{t.saveTemplate}</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1}}><Inp label={t.templateName} rtl={rtl} value={newTemplateName} onChange={e=>setNewTemplateName(e.target.value)}/></div>
            <button onClick={saveTemplate} style={{padding:"9px 20px",borderRadius:8,border:"none",
              background:C.teal,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:14}}>
              💾 {rtl?"حفظ":"Save"}
            </button>
          </div>
          {templateSavedMsg&&<div style={{fontSize:13,color:C.sage,fontWeight:600}}>✓ {t.templateSaved}</div>}
          <div style={{fontSize:11.5,color:C.slate,marginTop:4,textAlign:rtl?"right":"left"}}>
            {rtl?"سيحفظ الإعدادات الحالية: الحالة، الحمية، وجبات، السعرات، ملاحظات، الأمراض، الأدوية.":"Saves current: case type, diet, meal frequency, calories, notes, morbidities, medications."}
          </div>
        </div>
      )}
      {/* Library */}
      {templates.length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",color:"#9BB0AD",fontSize:14}}>{t.noTemplates}</div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {templates.map(tmpl=>{
            const ct=CASE_TYPES.find(c=>c.value===tmpl.caseType);
            const dt=DIET_TYPES.find(d=>d.value===tmpl.dietType);
            return(
              <div key={tmpl.id} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:14,
                padding:"16px 18px",boxShadow:"0 2px 10px rgba(27,107,107,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexDirection:rtl?"row-reverse":"row"}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.ink}}>{tmpl.name}</div>
                  <button onClick={()=>setTemplates(prev=>prev.filter(x=>x.id!==tmpl.id))}
                    style={{background:"none",border:"none",color:"#9BB0AD",cursor:"pointer",fontSize:16,padding:"0 2px"}}>✕</button>
                </div>
                {dt&&<div style={{background:dt.color+"15",border:`1px solid ${dt.color}30`,borderRadius:8,padding:"6px 10px",marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700,color:dt.color}}>{dt.icon} {dt.label[lang]}</span>
                </div>}
                <div style={{fontSize:12,color:C.slate,marginBottom:4,textAlign:rtl?"right":"left"}}>
                  {ct?.[lang]||ct?.en||tmpl.caseType}
                </div>
                {tmpl.calorieOverride&&<div style={{fontSize:11.5,color:C.amber,fontWeight:600,marginBottom:6}}>⚡ {tmpl.calorieOverride} kcal/day</div>}
                <div style={{fontSize:10.5,color:"#9BB0AD",marginBottom:10}}>Saved {tmpl.savedAt}</div>
                <button onClick={()=>loadTemplate(tmpl)} style={{width:"100%",padding:"8px",borderRadius:8,
                  border:`1.5px solid ${C.teal}`,background:C.tealLt,color:C.teal,
                  fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  📥 {t.loadTemplate}
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
  // ── Layout ────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.tealLt} 0%,#F0FAF7 40%,#FFF 100%)`,
      fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
      {/* Top bar */}
      <div style={{background:C.teal,padding:"0 20px",display:"flex",alignItems:"center",
        justifyContent:"space-between",height:60,direction:rtl?"rtl":"ltr"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,flexDirection:rtl?"row-reverse":"row"}}>
          <div style={{width:38,height:38,borderRadius:10,background:"rgba(255,255,255,.15)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🥗</div>
          <div style={{textAlign:rtl?"right":"left"}}>
            <div style={{color:C.white,fontWeight:800,fontSize:16}}>{t.appName}</div>
            <div style={{color:"rgba(255,255,255,.7)",fontSize:10}}>{t.appSub}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexDirection:rtl?"row-reverse":"row"}}>
          <button onClick={()=>setLang(l=>l==="en"?"ar":"en")} style={{
            padding:"6px 14px",borderRadius:20,border:"1.5px solid rgba(255,255,255,.5)",
            background:"rgba(255,255,255,.15)",color:C.white,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {t.langBtn}
          </button>
          {plan&&[
            {label:t.printSave,action:()=>window.print()},
            {label:t.newPlan,action:()=>{setPlan(null);setStep(1);setCaseType("");setDietType("");setShowEmailPanel(false);setShowCalPanel(false);}},
          ].map(b=>(
            <button key={b.label} onClick={b.action} style={{padding:"7px 14px",borderRadius:8,
              border:"1.5px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.15)",
              color:C.white,fontSize:12,fontWeight:600,cursor:"pointer"}}>{b.label}</button>
          ))}
        </div>
      </div>

      {/* Main */}
      <div style={{maxWidth:920,margin:"0 auto",padding:"26px 16px 60px"}}>
        <div className="no-print"><StepBar/></div>
        <div style={{background:C.white,borderRadius:16,boxShadow:"0 4px 32px rgba(27,107,107,.08)",
          border:`1px solid ${C.border}`,padding:"26px 28px"}}>

          {step===1&&<Step1/>}
          {step===2&&<Step2/>}
          {step===3&&<Step3/>}
          {step===4&&plan&&<PlanOutput/>}
          {step===5&&<ProgressTab/>}
          {step===6&&<TemplatesTab/>}

          {error&&<div style={{background:C.redLt,border:`1.5px solid ${C.red}30`,borderRadius:8,
            padding:"10px 14px",fontSize:13,color:C.red,marginTop:12,direction:dir}}>⚠️ {error}</div>}

          {/* Nav buttons */}
          {step<4&&(
            <div className="no-print" style={{display:"flex",justifyContent:"space-between",marginTop:26,
              borderTop:`1.5px solid ${C.border}`,paddingTop:18,direction:rtl?"rtl":"ltr"}}>
              <button onClick={()=>setStep(s=>Math.max(1,s-1))} disabled={step===1}
                style={{padding:"10px 22px",borderRadius:9,border:`1.5px solid ${C.border}`,
                  background:C.white,color:step===1?"#C5D5D2":C.slate,
                  fontSize:14,fontWeight:600,cursor:step===1?"not-allowed":"pointer"}}>
                {rtl?"→ رجوع":"← Back"}
              </button>
              {step<3?(
                <button onClick={()=>setStep(s=>s+1)} style={{padding:"10px 26px",borderRadius:9,border:"none",
                  background:`linear-gradient(135deg,${C.teal},${C.tealMid})`,color:C.white,
                  fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 3px 12px rgba(27,107,107,.3)"}}>
                  {rtl?"← التالي":"Next →"}
                </button>
              ):(
                <button onClick={generatePlan} disabled={loading} style={{padding:"10px 30px",borderRadius:9,border:"none",
                  background:loading?C.border:`linear-gradient(135deg,${C.sage},#2E8060)`,color:C.white,
                  fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",
                  boxShadow:loading?"none":"0 3px 12px rgba(74,155,127,.4)",
                  display:"flex",alignItems:"center",gap:10}}>
                  {loading?(<><span style={{display:"inline-block",width:16,height:16,
                    border:"2px solid rgba(255,255,255,.4)",borderTop:"2px solid white",
                    borderRadius:"50%",animation:"spin 1s linear infinite"}}/>{t.generating}</>):t.generate}
                </button>
              )}
            </div>
          )}

          {/* Plan action bar */}
          {step===4&&plan&&(
            <div className="no-print" style={{display:"flex",gap:10,marginTop:22,paddingTop:18,
              borderTop:`1.5px solid ${C.border}`,flexWrap:"wrap",direction:rtl?"rtl":"ltr"}}>
              <button onClick={()=>setStep(3)} style={{padding:"8px 18px",borderRadius:8,
                border:`1.5px solid ${C.border}`,background:C.white,color:C.slate,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {t.adjustSettings}
              </button>
              <button onClick={()=>setStep(5)} style={{padding:"8px 18px",borderRadius:8,
                border:`1.5px solid ${C.teal}`,background:C.tealLt,color:C.teal,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {t.toProgress}
              </button>
              <button onClick={()=>setStep(6)} style={{padding:"8px 18px",borderRadius:8,
                border:`1.5px solid ${C.sage}`,background:C.sageLt,color:C.sage,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {t.toTemplates}
              </button>
              <button onClick={generatePlan} disabled={loading} style={{padding:"8px 18px",borderRadius:8,border:"none",
                background:`linear-gradient(135deg,${C.sage},#2E8060)`,color:C.white,
                fontSize:12,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
                {loading?t.generating:t.regenerate}
              </button>
            </div>
          )}

          {(step===5||step===6)&&(
            <div className="no-print" style={{display:"flex",gap:10,marginTop:22,paddingTop:18,borderTop:`1.5px solid ${C.border}`}}>
              {plan&&<button onClick={()=>setStep(4)} style={{padding:"8px 18px",borderRadius:8,
                border:`1.5px solid ${C.border}`,background:C.white,color:C.slate,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                ← {rtl?"العودة للخطة":"Back to Plan"}
              </button>}
              <button onClick={()=>setStep(step===5?6:5)} style={{padding:"8px 18px",borderRadius:8,
                border:`1.5px solid ${C.teal}`,background:C.tealLt,color:C.teal,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {step===5?t.toTemplates:t.toProgress}
              </button>
            </div>
          )}

          {loading&&<div style={{textAlign:"center",padding:"20px 0",direction:dir}}>
            <div style={{fontSize:14,color:C.slate}}>{t.analysing}</div>
          </div>}
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}} @media print{.no-print{display:none!important;} body{margin:0;}}`}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(NutritionPlanner));
  </script>
</body>
</html>
